name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | tail -1)
          sudo xcode-select -s "$XCODE"
      - name: Build
        run: |
          xcodebuild -scheme GHLauncher \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tail -60
      - name: Package
        run: |
          APP=$(find build -name "GHLauncher.app" -type d | head -1)
          echo "App: $APP"
          ls -la "$APP" 2>/dev/null || echo "Not found"
          [ -d "$APP" ] && mkdir -p Payload && cp -r "$APP" Payload/ && zip -r GHLauncher.ipa Payload
          ls -lh GHLauncher.ipa 2>/dev/null || echo "No IPA"
      - uses: actions/upload-artifact@v4
        with:
          name: GHLauncher.ipa
          path: GHLauncher.ipa
          retention-days: 90

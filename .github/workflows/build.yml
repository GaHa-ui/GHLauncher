name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build
        run: |
          xcodebuild clean build \
            -project GHLauncher.xcodeproj \
            -scheme GHLauncher \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
      - name: Package IPA
        run: |
          APP=$(find DerivedData -name "GHLauncher.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          codesign --remove-signature Payload/GHLauncher.app 2>/dev/null || true
          zip -r GHLauncher.ipa Payload
          ls -lh GHLauncher.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: GHLauncher.ipa
          path: GHLauncher.ipa
          retention-days: 90

name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | tail -1)
          sudo xcode-select -s "$XCODE"
      - name: Build
        run: |
          xcodebuild -scheme GHLauncher \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build
      - name: Package .app and IPA
        run: |
          BINARY="build/Build/Products/Release-iphoneos/GHLauncher"
          APP="Payload/GHLauncher.app"
          mkdir -p "$APP"

          # Copy binary
          cp "$BINARY" "$APP/GHLauncher"
          chmod +x "$APP/GHLauncher"

          # Create Info.plist
          cat > "$APP/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>GHLauncher</string>
          <key>CFBundleIdentifier</key><string>com.ghlauncher.app</string>
          <key>CFBundleName</key><string>GHLauncher</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>
          <key>UIApplicationSceneManifest</key><dict>
          <key>UIApplicationSupportsMultipleScenes</key><false/>
          </dict>
          <key>UILaunchScreen</key><dict>
          <key>UIColorName</key><string></string>
          </dict>
          <key>UISupportedInterfaceOrientations</key><array>
          <string>UIInterfaceOrientationPortrait</string>
          <string>UIInterfaceOrientationLandscapeLeft</string>
          <string>UIInterfaceOrientationLandscapeRight</string>
          </array>
          </dict></plist>
          PLIST

          # Copy Swift runtime support (from SPM)
          cp -r build/Build/Products/Release-iphoneos/GHLauncher.swiftmodule/ "$APP/" 2>/dev/null || true

          # Ad-hoc sign
          codesign --force --sign - "$APP"

          # Create IPA
          zip -r GHLauncher.ipa Payload
          ls -lh GHLauncher.ipa
          rm -rf Payload
      - uses: actions/upload-artifact@v4
        with:
          name: GHLauncher.ipa
          path: GHLauncher.ipa
          retention-days: 90

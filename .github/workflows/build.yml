name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Build with swift build
        run: |
          swift build -c release \
            -Xswiftc "-sdk" \
            -Xswiftc "$(xcrun --sdk iphoneos --show-sdk-path)" \
            -Xswiftc "-target" \
            -Xswiftc "arm64-apple-ios15.0"

      - name: Package IPA
        run: |
          BINARY=$(find .build -name "GHLauncher" -type f ! -name "*.swiftmodule" | head -1)
          echo "Binary: $BINARY"
          mkdir -p Payload/GHLauncher.app
          cp "$BINARY" Payload/GHLauncher.app/GHLauncher
          cat > Payload/GHLauncher.app/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>GHLauncher</string>
          <key>CFBundleIdentifier</key><string>com.ghlauncher.app</string>
          <key>CFBundleName</key><string>GHLauncher</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>
          <key>UIApplicationSceneManifest</key><dict>
          <key>UIApplicationSupportsMultipleScenes</key><false/>
          </dict>
          <key>UILaunchScreen</key><dict>
          <key>UIColorName</key><string></string>
          </dict>
          <key>UISupportedInterfaceOrientations</key><array>
          <string>UIInterfaceOrientationPortrait</string>
          <string>UIInterfaceOrientationLandscapeLeft</string>
          <string>UIInterfaceOrientationLandscapeRight</string>
          </array>
          </dict></plist>
          PLIST
          codesign --force --sign - Payload/GHLauncher.app
          zip -r GHLauncher.ipa Payload
          ls -lh GHLauncher.ipa
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: GHLauncher.ipa
          path: GHLauncher.ipa
          retention-days: 90

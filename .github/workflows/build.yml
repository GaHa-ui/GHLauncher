name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode versions
        run: ls /Applications/

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Create minimal xcodeproj
        run: |
          mkdir -p GHLauncher.xcodeproj
          cat > GHLauncher.xcodeproj/project.pbxproj << 'PBX'
          PBXFileReference;
          rootObject = MAIN /* Project object */;
        PBX
          // Use a proper approach: create the project via xcodebuild init
          # Instead, try swift package generate-xcodeproj
          swift package generate-xcodeproj \
            --xcconfig-overrides "project.yml" \
            --build-path xcodeproj_build 2>/dev/null || \
          swift package generate-xcodeproj 2>/dev/null || \
          echo "gen-xcodeproj failed, trying alternative..."

      - name: Build with xcodebuild
        run: |
          # Try direct xcodebuild with SPM package
          xcodebuild -scheme GHLauncher \
            -destination "generic/platform=iOS" \
            -configuration Release \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tail -100

      - name: Package IPA
        run: |
          APP=$(find build -name "GHLauncher.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            APP=$(find . -name "GHLauncher.app" -type d 2>/dev/null | grep -v DerivedData | head -1)
          fi
          echo "Found: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          codesign --remove-signature Payload/GHLauncher.app 2>/dev/null || true
          zip -r GHLauncher.ipa Payload
          ls -lh GHLauncher.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: GHLauncher.ipa
          path: GHLauncher.ipa
          retention-days: 90

name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          sudo xcode-select -s "$XCODE"
          echo "Using $(xcrun --show-sdk-ver)"

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -scheme GHLauncher \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            build | tee build.log

      - name: Debug artifacts
        if: always()
        run: |
          echo "=== Build dir ==="
          find build -name "*.app" -type d 2>/dev/null | head -20
          echo "=== Log tail ==="
          tail -80 build.log

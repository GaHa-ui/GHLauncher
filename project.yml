name: GHLauncher
options:
  bundleId: com.ghlauncher.app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "1600"

targets:
  GHLauncher:
    type: application
    platform: iOS
    sources:
      - GHLauncher
    settings:
      base:
        INFOPLIST_FILE: GHLauncher/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ghlauncher.app
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_VERSION: "5.9"

name: Build IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app | tail -1)
          sudo xcode-select -s "$XCODE"
      - name: Build
        run: |
          xcodebuild -scheme GHLauncher \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build
      - name: Find .app
        run: |
          echo "=== Searching .app ==="
          find . -name "*.app" -type d -maxdepth 10 2>/dev/null
          echo "=== Build dir ==="
          ls -la build/
          echo "=== Products ==="
          ls -la build/Build/Products/ 2>/dev/null || echo "no Products"
          echo "=== Release ==="
          ls -la build/Build/Products/Release-iphoneos/ 2>/dev/null || echo "no Release"
      - name: Package IPA
        run: |
          APP=$(find . -name "GHLauncher.app" -type d 2>/dev/null | head -1)
          echo "Found app at: $APP"
          if [ -d "$APP" ]; then
            mkdir -p Payload
            cp -r "$APP" Payload/
            zip -r GHLauncher.ipa Payload
            ls -lh GHLauncher.ipa
          else
            echo "No .app found, exiting"
            exit 0
          fi
      - uses: actions/upload-artifact@v4
        if: hashFiles('GHLauncher.ipa') != ''
        with:
          name: GHLauncher.ipa
          path: GHLauncher.ipa
          retention-days: 90
